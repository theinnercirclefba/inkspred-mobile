# Codemagic CI/CD for the InkSpred NATIVE app (Expo SDK 52 / expo-router).
#
# This REPLACES the old Capacitor wrapper pipeline. It builds a real React
# Native iOS app on a cloud Mac and ships it to TestFlight.
#
# This file lives at apps/native/codemagic.yaml in the monorepo, but it is
# pushed to the ROOT of the standalone build repo (theinnercirclefba/
# inkspred-mobile) by scripts/push-to-buildrepo.py — Codemagic auto-detects a
# codemagic.yaml at the repo root, so no dashboard config changes are needed.
#
# Reuses the SAME account-level Codemagic setup as the Capacitor wrapper and the
# Chop Shop 86 / Inner Circle apps (nothing here needs re-adding):
#   • integration "app_store_connect" → App Store Connect API key
#   • env group "signing"             → CERT_KEY (persistent iOS dist cert)
#   • bundle id app.inkspred          → registered in App Store Connect
#
# Native ios/ is NOT committed — `expo prebuild` regenerates it on the cloud
# instance every build, so nothing here needs a Mac locally.

workflows:
  ios-native:
    name: InkSpred iOS (native) — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 45
    integrations:
      app_store_connect: app_store_connect
    environment:
      groups:
        - signing
      vars:
        BUNDLE_ID: "app.inkspred"
        # expo prebuild derives these from app.json's name "InkSpred".
        XCODE_WORKSPACE: "ios/InkSpred.xcworkspace"
        XCODE_SCHEME: "InkSpred"
      node: 24
      # Pinned: RN 0.76's bundled fmt fails consteval checks under the newest
      # clang (Xcode 26.x). 16.4 is the newest officially supported toolchain.
      xcode: 16.4
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          # Strip any workspace-protocol deps (version "*" or "workspace:*")
          # before install — those only resolve inside the monorepo, and this
          # standalone repo has no registry entry for them. They are unused in
          # the app source, so removing them is safe.
          node -e '
            const fs = require("fs");
            const p = "package.json";
            const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            let removed = [];
            for (const field of ["dependencies", "devDependencies"]) {
              const deps = pkg[field];
              if (!deps) continue;
              for (const [name, ver] of Object.entries(deps)) {
                if (ver === "*" || String(ver).startsWith("workspace:")) {
                  delete deps[name];
                  removed.push(name);
                }
              }
            }
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            console.log("Pruned workspace deps:", removed.join(", ") || "(none)");
          '
          npm install
      - name: Prebuild iOS native project (generates ios/)
        script: |
          # --no-install: skip the automatic pod install / npm install; we run
          # pod install explicitly in the next step so it's visible in the log.
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing (reuses the persistent CERT_KEY)
        script: |
          keychain initialize
          echo "$CERT_KEY" | openssl base64 -d -A > /tmp/sign_key
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/sign_key \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number from Codemagic build counter
        script: |
          cd ios
          agvtool new-version -all $BUILD_NUMBER
      - name: Build iOS .ipa
        script: |
          set +e
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
          RC=$?
          if [ $RC -ne 0 ]; then
            echo "========== SIGNING / ARCHIVE ERROR DETAIL =========="
            grep -rhiE "error:|entitlement|provisioning profile|doesn't include|requires a provisioning|code ?sign" /tmp/xcodebuild_logs/*.log 2>/dev/null | sort -u | tail -60
            echo "========== END ERROR DETAIL =========="
          fi
          exit $RC
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.app.dSYM.zip"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
